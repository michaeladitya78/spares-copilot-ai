services:
  - type: web
    name: synapse-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run server:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: synapse-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: synapse-web
    env: static
    plan: starter
    buildCommand: npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://synapse-api.onrender.com/api/$1
      - type: rewrite
        source: /ws
        destination: https://synapse-api.onrender.com/ws

databases:
  - name: synapse-postgres
    plan: starter
    ipAllowList: []
