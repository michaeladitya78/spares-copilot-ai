name: Deploy Synapse AI Bot

# Trigger deployment when code is pushed to main branches
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  deploy:
    name: Build and Deploy to Vercel
    runs-on: ubuntu-latest
    
    steps:
      # Get the latest code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      # Install all project dependencies
      - name: Install dependencies
        run: npm ci
        
      # Check code quality with ESLint
      - name: Run linting
        run: npm run lint
        
      # Verify TypeScript types are correct
      - name: Run type checking
        run: npm run type-check
        
      # Build the production version
      - name: Build project
        run: npm run build
        
      # Check if Vercel deployment secrets are configured
      - name: Check Vercel Secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.ORG_ID }}" ] || [ -z "${{ secrets.PROJECT_ID }}" ]; then
            echo "::warning::Vercel deployment secrets (VERCEL_TOKEN, ORG_ID, PROJECT_ID) are missing. Skipping deployment step."
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          fi

      # Deploy to Vercel platform (only if secrets are present)
      - name: Deploy to Vercel
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          working-directory: ./
